<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="个人中心可以查看和管理已保存的周报记录、历史汇报内容，方便你随时回看或删除。" />
    <meta name="keywords" content="个人中心, 周报记录, 历史汇报, AI周报记录, 周报管理" />
    <meta name="author" content="树懒" />
    <meta name="robots" content="index,follow" />
    <meta name="theme-color" content="#F9F6F0" />
    <meta property="og:title" content="个人中心 | 树懒 · AI周报生成器" />
    <meta property="og:description" content="在个人中心管理你的周报记录、历史汇报内容，方便随时查看和删除。" />
    <meta property="og:type" content="website" />
    <meta property="og:locale" content="zh_CN" />
    <meta property="og:site_name" content="树懒 · 替你写周报" />
    <meta name="twitter:card" content="summary" />
    <meta name="twitter:title" content="个人中心 | 树懒 · AI周报生成器" />
    <meta name="twitter:description" content="在个人中心管理你的周报记录、历史汇报内容，方便随时查看和删除。" />
    <title>个人中心 | 树懒 · AI周报生成器</title>
    <link rel="canonical" href="/profile.html" />
    <link rel="stylesheet" href="css/common.css" />
    <link rel="stylesheet" href="css/profile.css" />
</head>
<body>

    <div class="container">

        <!-- ===== 顶部导航 ===== -->
        <nav class="navbar">
            <div class="logo"><a href="index.html">🦥 树懒 · <span>替你写周报</span></a></div>
            <div class="nav-links">
                <a href="index.html">首页</a>
                <a href="about.html">关于</a>
                <a href="communication.html">职场沟通</a>
                <a href="profile.html" class="active">个人中心</a>
                <button class="btn-logout" id="logoutBtn">退出登录</button>
            </div>
        </nav>

        <!-- ===== 个人中心 ===== -->
        <div class="profile-section">

            <!-- 未登录状态 -->
            <div id="loginPrompt" class="login-prompt" style="display:none;">
                <span>🔒</span>
                <h2>请先登录</h2>
                <p>登录后可以查看你的周报和月报记录</p>
                <button class="btn-login" onclick="window.location.href='index.html'">去登录</button>
            </div>

            <!-- 已登录状态 -->
            <div id="profileContent">
                <h1>个人中心</h1>
                <p class="sub">管理你的账号和汇报记录</p>

                <!-- 账号信息 -->
                <div class="info-card">
                    <div class="card-title">📋 账号信息</div>
                    <div class="field">
                        <span class="label">邮箱</span>
                        <span class="value" id="userEmail">user@example.com</span>
                    </div>
                    <div class="field" id="roleField">
                        <span class="label">工作岗位</span>
                        <span class="value" id="userRoleDisplay">未设置</span>
                        <button class="btn-edit" id="editRoleBtn">修改</button>
                    </div>
                    <div class="field" id="roleEditField" style="display:none;">
                        <span class="label">工作岗位</span>
                        <div style="flex:1;">
                            <div class="role-options-mini">
                                <button data-role="技术开发">技术开发</button>
                                <button data-role="产品经理">产品经理</button>
                                <button data-role="运营">运营</button>
                                <button data-role="销售">销售</button>
                                <button data-role="市场/品牌">市场/品牌</button>
                                <button data-role="设计">设计</button>
                                <button data-role="人事/HR">人事/HR</button>
                                <button data-role="财务">财务</button>
                                <button data-role="电商运营">电商运营</button>
                                <button data-role="其他" class="btn-other-role">✏️ 自定义</button>
                            </div>
                            <div style="margin-top:10px;display:none;" id="customRoleInputWrapper">
                                <input type="text" id="customRoleInput" placeholder="输入你的岗位名称" />
                            </div>
                            <div style="margin-top:10px;display:flex;gap:8px;">
                                <button class="btn-save" id="saveRoleBtn">保存</button>
                                <button class="btn-edit" id="cancelRoleBtn" style="border:1px solid var(--border-light);background:transparent;padding:4px 16px;border-radius:16px;font-size:13px;color:var(--text-lighter);cursor:pointer;font-family:inherit;">取消</button>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- 汇报记录 -->
                <div class="info-card">
                    <div class="card-title">📄 汇报记录</div>
                    <div class="tab-bar">
                        <button class="tab-btn active" data-tab="weekly">周报记录</button>
                        <button class="tab-btn" data-tab="monthly">月报记录</button>
                    </div>
                    <div class="tab-content active" id="weeklyTab">
                        <div class="record-list" id="weeklyList"></div>
                        <div class="pagination" id="weeklyPagination"></div>
                    </div>
                    <div class="tab-content" id="monthlyTab">
                        <div class="record-list" id="monthlyList"></div>
                        <div class="pagination" id="monthlyPagination"></div>
                    </div>
                </div>
            </div>

        </div>

        <!-- ===== 底部 ===== -->
        <div class="footer-motto">
            🦥 慢慢来，不焦虑 · 不收费 · 不打扰
            <span>·</span> 用着舒服就好
        </div>

    </div>

    <!-- ===== 删除确认弹窗 ===== -->
    <div class="modal-overlay" id="deleteModal">
        <div class="modal-box">
            <h3>⚠️ 确认删除</h3>
            <p id="deleteModalText">确定要删除这条记录吗？<br /><strong>删除后不可恢复，没有后悔药。</strong></p>
            <div class="modal-actions">
                <button class="btn-cancel" id="deleteCancelBtn">取消</button>
                <button class="btn-confirm" id="deleteConfirmBtn">确认删除</button>
            </div>
        </div>
    </div>

    <script src="js/common.js"></script>
    <script src="js/profile.js"></script>

    <script type="application/ld+json">
    {
        "@context": "https://schema.org",
        "@type": "ProfilePage",
        "name": "个人中心",
        "description": "管理个人资料、查看和删除保存的周报记录，方便持续跟踪汇报内容。",
        "url": "profile.html"
    }
    </script>

</body>
</html>
